[bench]
name = "Paleo Benchmark Run"
output = "static/results.json"
# Lower this if providers start timing out under concurrent load.
max_concurrency = 4

# Optional cooldown after each provider call. Useful when resume runs leave many
# missing rows from the same provider.
[bench.provider_cooldown_seconds]
anthropic = 10
openai = 10
google = 10
openrouter = 10

[prompts]
system = "You are an expert at reading handwritten text."
user = "Transcribe the handwritten text in this image exactly as written. Output only the transcription, nothing else."

[[models]]
id = "anthropic:claude-sonnet-4-6"
label = "sonnet-4.6-no-thinking"

[[models]]
id = "anthropic:claude-opus-4-7"
label = "opus-4.7-thinking"
max_tokens = 16000
# Optional PydanticAI request timeout in seconds for slower vision/reasoning models.
timeout = 300
thinking = "high"

[[models]]
id = "openai-chat:gpt-5.5"
label = "gpt-5.5-low"
thinking = "low"

[[models]]
id = "openai-chat:gpt-5.4-mini"
label = "gpt-5.4-mini-low"
thinking = "low"

[[models]]
id = "google:gemini-3.1-pro-preview"
label = "gemini-3.1-pro-low"
thinking = "low"

[[models]]
id = "google:gemini-3.5-flash"
label = "gemini-3.5-flash-low"
thinking = "low"

[[models]]
id = "openrouter:qwen/qwen3.6-plus"
label = "Qwen 3.6 Plus"
# Must set OPENROUTER_API_KEY in .env
input_token_cost = 0.000000325
output_token_cost = 0.00000195
image_max_bytes = 900000
image_max_dimension = 3000
timeout = 300

[[models]]
id = "openrouter:x-ai/grok-4.3"
label = "Grok 4.3"
input_token_cost = 0.00000125
output_token_cost = 0.0000025
image_max_bytes = 900000
image_max_dimension = 3000
timeout = 300

[[models]]
id = "openrouter:moonshotai/kimi-k2.6"
label = "Kimi K2.6"
input_token_cost = 0.00000075
output_token_cost = 0.0000035
extra_body = { provider = { order = ["DeepInfra", "Novita", "Moonshot AI", "SiliconFlow"], allow_fallbacks = true } }
image_max_bytes = 900000
image_max_dimension = 3000
timeout = 300

[[models]]
id = "openrouter:meta-llama/llama-4-maverick"
label = "Llama 4 Maverick"
input_token_cost = 0.00000015
output_token_cost = 0.0000006
image_max_bytes = 900000
image_max_dimension = 3000
timeout = 300

[[models]]
id = "openrouter:meta-llama/llama-4-scout"
label = "Llama 4 Scout"
input_token_cost = 0.00000008
output_token_cost = 0.0000003
image_max_bytes = 900000
image_max_dimension = 3000
timeout = 300

[[models]]
id = "openrouter:qwen/qwen3.6-35b-a3b"
label = "Qwen 3.6 35B A3B"
input_token_cost = 0.00000015
output_token_cost = 0.000001
image_max_bytes = 900000
image_max_dimension = 3000
timeout = 300

[[groups]]
name = "Byzantine Greek"

[[groups.samples]]
label = "GA 01, Rom 1:1-11"
image = "https://example.org/iiif/byzantine_sample1/info.json"
side = "verso"
ground_truth = "data/grk_byz/GA1_72v.txt"

[[groups.samples]]
label = "GA 02, Rom 1:12-25"
image = "https://example.org/iiif/byzantine_sample2/info.json"
side = "recto"
ground_truth = "data/grk_byz/GA1_73r.txt"

