[bench]
name = "Test Run"
output = "results.json"
max_concurrency = 2

[prompts]
system = "You are an expert at reading handwritten text."
user = "Transcribe the handwritten text in this image exactly as written. Output only the transcription, nothing else."

[[models]]
id = "anthropic:claude-sonnet-4-6"
label = "sonnet-4.6-no-thinking"

[[models]]
id = "anthropic:claude-opus-4-7"
label = "opus-4.7-thinking"
max_tokens = 16000
thinking = "high"

[[models]]
id = "openai-chat:gpt-5.4-mini"
label = "gpt-5.4-mini-low"
thinking = "low"

[[models]]
id = "google:gemini-3.5-flash"
label = "gemini-3.5-flash-low"
thinking = "low"

[[models]]
id = "openrouter:qwen/qwen3.6-plus"
label = "qwen3.6-plus"
input_token_cost = 0.000000325
output_token_cost = 0.00000195
image_max_bytes = 900000
image_max_dimension = 3000
timeout = 300

[[models]]
id = "openrouter:moonshotai/kimi-k2.6"
label = "kimi-k2.6"
input_token_cost = 0.00000075
output_token_cost = 0.0000035
extra_body = { provider = { order = ["DeepInfra", "Novita", "Moonshot AI", "SiliconFlow"], allow_fallbacks = true } }
image_max_bytes = 900000
image_max_dimension = 3000
timeout = 300

[[groups]]
name = "Test Group"

[[groups.samples]]
image = "https://example.org/iiif/test_sample1/info.json"
ground_truth = "data/grk_byz/GA1_72v.txt"
